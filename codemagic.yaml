workflows:
  android-apk-build:
    name: Recharge Light Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        EXPO_PUBLIC_BACKEND_URL: "https://rechargelight.in"
      node: 20
      java: 17
    
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - node_modules
    
    scripts:
      - name: Install dependencies
        script: |
          yarn install --ignore-engines
      
      - name: Set environment
        script: |
          echo "EXPO_PUBLIC_BACKEND_URL=https://rechargelight.in" > .env
      
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      
      - name: Build Release APK
        script: |
          cd android
          ./gradlew assembleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - support@rechargelight.in
        notify:
          success: true
          failure: true

  android-aab-build:
    name: Recharge Light Android AAB (Play Store)
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        EXPO_PUBLIC_BACKEND_URL: "https://rechargelight.in"
      node: 20
      java: 17
    
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - node_modules
    
    scripts:
      - name: Install dependencies
        script: |
          yarn install --ignore-engines
      
      - name: Set environment
        script: |
          echo "EXPO_PUBLIC_BACKEND_URL=https://rechargelight.in" > .env
      
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      
      - name: Build Release AAB
        script: |
          cd android
          ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
    
    publishing:
      email:
        recipients:
          - support@rechargelight.in
        notify:
          success: true
          failure: true
