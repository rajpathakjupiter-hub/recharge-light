workflows:
  android-apk-build:
    name: Recharge Light Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        EXPO_PUBLIC_BACKEND_URL: "https://rechargelight.in"
      node: 20
      java: 17
    
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - node_modules
    
    scripts:
      - name: Install dependencies
        script: |
          yarn install --ignore-engines
      
      - name: Set environment
        script: |
          echo "EXPO_PUBLIC_BACKEND_URL=https://rechargelight.in" > .env
      
      - name: Setup Android SDK
        script: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;27.1.12297006" || sdkmanager "ndk;26.1.10909125" || echo "Using default NDK"
      
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      
      - name: Build APK
        script: |
          cd android
          ./gradlew app:assembleRelease -x lint --no-daemon || ./gradlew app:assembleRelease -x lint -x validateSigningRelease --no-daemon
    
    artifacts:
      - android/app/build/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - support@rechargelight.in
        notify:
          success: true
          failure: true

  android-aab-playstore:
    name: Recharge Light PlayStore AAB
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        EXPO_PUBLIC_BACKEND_URL: "https://rechargelight.in"
        PACKAGE_NAME: "com.rechargelight.app"
        KEY_ALIAS: "rechargelight"
        KEY_PASSWORD: "RechargeLight@2024"
        STORE_PASSWORD: "RechargeLight@2024"
      node: 20
      java: 17
    
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - node_modules
    
    scripts:
      - name: Install dependencies
        script: |
          yarn install --ignore-engines
      
      - name: Set environment
        script: |
          echo "EXPO_PUBLIC_BACKEND_URL=https://rechargelight.in" > .env
      
      - name: Setup Android SDK
        script: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;27.1.12297006" || sdkmanager "ndk;26.1.10909125" || echo "Using default NDK"
      
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      
      - name: Generate release keystore
        script: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore android/app/rechargelight-release.keystore \
            -alias $KEY_ALIAS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass $STORE_PASSWORD \
            -keypass $KEY_PASSWORD \
            -dname "CN=Recharge Light, OU=Mobile, O=Recharge Light, L=India, ST=India, C=IN"
      
      - name: Configure release signing
        script: |
          python3 <<'PYEOF'
          import os
          
          gradle_path = "android/app/build.gradle"
          with open(gradle_path, "r") as f:
              content = f.read()
          
          store_pass = os.environ.get("STORE_PASSWORD", "RechargeLight@2024")
          key_alias = os.environ.get("KEY_ALIAS", "rechargelight")
          key_pass = os.environ.get("KEY_PASSWORD", "RechargeLight@2024")
          
          release_config = f'''
            release {{
                storeFile file("rechargelight-release.keystore")
                storePassword "{store_pass}"
                keyAlias "{key_alias}"
                keyPassword "{key_pass}"
            }}'''
          
          import re
          pattern = r'(signingConfigs\s*\{[^}]*debug\s*\{[^}]*\})'
          match = re.search(pattern, content, re.DOTALL)
          if match:
              insert_pos = match.end()
              content = content[:insert_pos] + release_config + content[insert_pos:]
          
          content = content.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release"
          )
          
          with open(gradle_path, "w") as f:
              f.write(content)
          
          print("Release signing configured successfully!")
          PYEOF
      
      - name: Build AAB for Play Store
        script: |
          cd android
          ./gradlew app:bundleRelease -x lint --no-daemon
    
    artifacts:
      - android/app/build/outputs/**/*.aab
    
    publishing:
      email:
        recipients:
          - support@rechargelight.in
        notify:
          success: true
          failure: true

  android-aab-unsigned:
    name: Recharge Light PlayStore AAB (Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        EXPO_PUBLIC_BACKEND_URL: "https://rechargelight.in"
      node: 20
      java: 17
    
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - node_modules
    
    scripts:
      - name: Install dependencies
        script: |
          yarn install --ignore-engines
      
      - name: Set environment
        script: |
          echo "EXPO_PUBLIC_BACKEND_URL=https://rechargelight.in" > .env
      
      - name: Setup Android SDK
        script: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;27.1.12297006" || sdkmanager "ndk;26.1.10909125" || echo "Using default NDK"
      
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      
      - name: Build AAB (Unsigned)
        script: |
          cd android
          ./gradlew app:bundleRelease -x lint -x validateSigningRelease --no-daemon || ./gradlew app:bundleDebug -x lint --no-daemon
    
    artifacts:
      - android/app/build/outputs/**/*.aab
    
    publishing:
      email:
        recipients:
          - support@rechargelight.in
        notify:
          success: true
          failure: true
